<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Sound List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Emote Sounds</h1>

        <!-- Migration Warning Banner -->
        <div class="warning-banner">
            <span class="warning-icon">⚠️</span>
            <span>Some sounds are currently unavailable while files are being migrated to a new host. This will be resolved soon!</span>
        </div>

        <!-- Dark/Light Mode Toggle -->
        <label class="switch" id="darkModeSwitch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>

        <!-- Dynamic List Container -->
        <div id="list"></div>

        <!-- Contact Me Button -->
        <div style="text-align:center; margin-top:40px;">
            <a href="https://twitch.tv/windowsben" target="_blank" class="contact-card">
                <!-- TODO: move this image to R2 -->
                <img src="https://files.catbox.moe/c65dyt.png" alt="Contact Me"
                     style="width:120px; height:auto; border-radius:12px; cursor:pointer;">
            </a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
